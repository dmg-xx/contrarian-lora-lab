<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Barnaby's Porch</title>
</head>

<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-2xl bg-zinc-900 border border-zinc-800 rounded-xl shadow-2xl overflow-hidden">
        <div class="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50">
            <div>
                <h1 class="text-2xl font-bold text-zinc-100">Barnaby's Porch</h1>
                <p class="text-zinc-500 text-sm italic">"Is there something you need?"</p>
            </div>
            <button onclick="resetChat()"
                class="text-xs font-semibold bg-zinc-800 hover:bg-red-900/30 text-zinc-400 hover:text-red-400 px-3 py-2 rounded-lg transition-all border border-zinc-700">
                FORGET EVERYTHING
            </button>
        </div>

        <div id="chat-box" class="h-[500px] overflow-y-auto p-6 space-y-4 scrollbar-thin scrollbar-thumb-zinc-700">
            <p class="text-zinc-600 text-center text-sm py-10">Barnaby is squinting at you from his porch...</p>
        </div>

        <div class="p-4 bg-zinc-800/50 border-t border-zinc-800">
            <div class="flex gap-3">
                <input id="user-input" type="text" onkeypress="if(event.key==='Enter') sendMsg()"
                    class="flex-1 bg-zinc-950 border border-zinc-700 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                    placeholder="Chat with Barnaby...">
                <button onclick="sendMsg()"
                    class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold shadow-lg transition-transform active:scale-95">
                    Chat
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        async function sendMsg() {
            const msg = userInput.value.trim();
            if (!msg) return;

            // Append User Message
            chatBox.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-blue-700/20 border border-blue-500/30 p-3 rounded-2xl rounded-tr-none max-w-[80%]">
                        <p class="text-blue-100 text-sm">${msg}</p>
                    </div>
                </div>`;

            userInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await response.json();

                // Append Barnaby Message
                chatBox.innerHTML += `
                    <div class="flex justify-start">
                        <div class="bg-zinc-800 border border-zinc-700 p-3 rounded-2xl rounded-tl-none max-w-[80%] shadow-lg">
                            <p class="text-zinc-300 text-sm leading-relaxed">${data.reply}</p>
                        </div>
                    </div>`;
            } catch (err) {
                chatBox.innerHTML += `<p class="text-red-500 text-center text-xs">Barnaby went back inside (Server Error).</p>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function resetChat() {
            await fetch('http://localhost:8000/reset', { method: 'POST' });
            chatBox.innerHTML = `<p class="text-zinc-600 text-center text-sm py-10 italic">Barnaby just took a nap. He doesn't remember who you are.</p>`;
        }
    </script>
</body>

</html>
