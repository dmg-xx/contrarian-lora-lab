# Stability Config for Barnaby V4
model: "mlx-community/Llama-3.2-3B-Instruct-4bit"
train: true
data: "data"

# Training Hyperparameters
iters: 800
batch_size: 4
learning_rate: 5e-5
steps_per_report: 10
steps_per_eval: 50

# LoRA Specifics
adapter_path: "adapters/skeptic_lora"
lora_parameters:
  rank: 32
  alpha: 32
  scale: 10.0
  dropout: 0.1
  keys: 
    - "self_attn.q_proj"
    - "self_attn.v_proj"
    - "self_attn.k_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"